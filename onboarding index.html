document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

: U+0900-097F, U+1CD0-1CF9, U+200C-200D, U+20A8, U+20B9, U+20F0, U+25CC, U+A830-A839, U+A8E0-A8FF, U+11B00-11B09;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"885aba26-74a2-4662-9054-d0ce4d71bcd4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Poppins';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"9fa50181-ffea-4066-93a1-afc5bd0b6d68\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n*{box-sizing:border-box;}\nhtml,body{margin:0;padding:0;background:#FAFAF8;}\nbody{font-family:'Poppins',sans-serif;-webkit-font-smoothing:antialiased;color:#1E1E1D;}\n::selection{background:#f0dcdb;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"min-height:100vh;background:#FAFAF8;font-family:'Poppins',sans-serif;color:#1E1E1D;\">\n\n  <!-- ============ WELCOME / NAME CAPTURE ============ -->\n  <sc-if value=\"{{ showOnboard }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;z-index:200;background:rgba(30,30,29,0.55);display:flex;align-items:center;justify-content:center;padding:24px;\">\n    <div style=\"width:470px;max-width:100%;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.34);\">\n      <div style=\"background:#1E1E1D;color:#fff;padding:32px 36px 30px;\">\n        <div style=\"font-family:'Plus Jakarta Sans';font-weight:800;font-size:18px;\">DOMO<span style=\"color:#D39593;\">.<\u002Fspan><\u002Fdiv>\n        <div style=\"font-family:'Plus Jakarta Sans';font-weight:800;font-size:28px;margin-top:18px;letter-spacing:-0.01em;\">Welcome to DOMO<span style=\"color:#D39593;\">.<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:13.5px;color:#c9c6bf;margin-top:10px;line-height:1.6;max-width:370px;\">“Domo” means gratitude — and we're glad you're here. Let's set up your space so we can keep track of your progress.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:28px 36px 32px;\">\n        <div style=\"font-size:12px;color:#8a8780;margin-bottom:7px;\">Your full name<\u002Fdiv>\n        <input value=\"{{ draftName }}\" oninput=\"{{ onName }}\" placeholder=\"e.g. Maria Georgiou\" style=\"width:100%;border:1px solid #e0ded7;border-radius:8px;padding:12px 14px;font-size:14px;font-family:'Poppins',sans-serif;color:#1E1E1D;outline:none;\" style-focus=\"border-color:#D39593;\">\n        <div style=\"font-size:12px;color:#8a8780;margin:18px 0 7px;\">Your role <span style=\"color:#b8b4ab;\">(optional)<\u002Fspan><\u002Fdiv>\n        <input value=\"{{ draftRole }}\" oninput=\"{{ onRole }}\" placeholder=\"e.g. Interior Designer\" style=\"width:100%;border:1px solid #e0ded7;border-radius:8px;padding:12px 14px;font-size:14px;font-family:'Poppins',sans-serif;color:#1E1E1D;outline:none;\" style-focus=\"border-color:#D39593;\">\n        <div style=\"font-size:11.5px;color:#a8a49b;margin-top:16px;line-height:1.55;\">Saved on this device so your progress is remembered next time.<\u002Fdiv>\n        <div onclick=\"{{ saveProfile }}\" style=\"{{ startBtnStyle }}\" style-hover=\"background:#000;\">Start my onboarding →<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ TOP BAR ============ -->\n  <div style=\"position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:16px 40px;border-bottom:1px solid #ececea;background:rgba(250,250,248,0.88);backdrop-filter:blur(8px);\">\n    <div onclick=\"{{ goHome }}\" style=\"cursor:pointer;display:flex;align-items:baseline;gap:10px;\">\n      <span style=\"font-family:'Plus Jakarta Sans';font-weight:800;font-size:20px;letter-spacing:-0.01em;\">DOMO<span style=\"color:#D39593;\">.<\u002Fspan><\u002Fspan>\n      <span style=\"font-size:10.5px;letter-spacing:0.2em;text-transform:uppercase;color:#a8a49b;font-weight:500;\">Onboarding<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:24px;\">\n      <span onclick=\"{{ goHome }}\" style=\"cursor:pointer;font-size:12.5px;color:#6b6863;\">Home<\u002Fspan>\n      <span style=\"font-size:12.5px;color:#a8a49b;\">{{ overallPctLabel }} complete<\u002Fspan>\n      <div style=\"position:relative;\">\n        <div onclick=\"{{ toggleMenu }}\" style=\"cursor:pointer;display:flex;align-items:center;gap:9px;\">\n          <span style=\"font-size:12.5px;color:#46443f;\">{{ profileName }}<\u002Fspan>\n          <div style=\"width:32px;height:32px;border-radius:50%;background:#D39593;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;\">{{ initials }}<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ menuOpen }}\">\n          <div style=\"position:absolute;right:0;top:46px;width:226px;background:#fff;border:1px solid #e6e4dd;border-radius:10px;box-shadow:0 14px 36px rgba(0,0,0,.14);overflow:hidden;z-index:80;\">\n            <div style=\"padding:14px 16px;border-bottom:1px solid #f0efeb;\">\n              <div style=\"font-size:13px;font-weight:600;\">{{ profileName }}<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#9a968d;margin-top:2px;\">{{ roleLabel }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div onclick=\"{{ editProfile }}\" style=\"padding:11px 16px;font-size:12.5px;color:#46443f;cursor:pointer;\" style-hover=\"background:#faf6f5;\">Edit name &amp; role<\u002Fdiv>\n            <div onclick=\"{{ resetProgress }}\" style=\"padding:11px 16px;font-size:12.5px;color:#46443f;cursor:pointer;border-top:1px solid #f0efeb;\" style-hover=\"background:#faf6f5;\">Reset my progress<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ HUB ============ -->\n  <sc-if value=\"{{ isHub }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:8px 40px 80px;display:flex;gap:0;align-items:flex-start;\">\n\n    <!-- main column -->\n    <div style=\"flex:1;padding:40px 48px 0 0;min-width:0;\">\n      <div style=\"font-size:11.5px;letter-spacing:0.2em;text-transform:uppercase;color:#a8a49b;\">{{ dateLabel }}<\u002Fdiv>\n      <div style=\"font-family:'Plus Jakarta Sans';font-weight:800;font-size:42px;line-height:1.06;margin-top:12px;letter-spacing:-0.02em;\">{{ greeting }}<span style=\"color:#D39593;\">.<\u002Fspan><\u002Fdiv>\n      <div style=\"font-size:14.5px;color:#6b6863;margin-top:14px;max-width:540px;line-height:1.6;\">{{ intro }}<\u002Fdiv>\n\n      <!-- resume card -->\n      <sc-if value=\"{{ loaded }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"margin-top:30px;border:1px solid #e6e4dd;border-radius:10px;overflow:hidden;display:flex;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.04);\">\n        <div style=\"width:210px;flex:none;background-image:repeating-linear-gradient(45deg,#efece6,#efece6 9px,#e7e3da 9px,#e7e3da 18px);display:flex;align-items:center;justify-content:center;\"><span style=\"font-family:monospace;font-size:10px;color:#9a968d;background:#fff;padding:4px 8px;border-radius:3px;\">team photo<\u002Fspan><\u002Fdiv>\n        <div style=\"padding:26px 30px;flex:1;\">\n          <div style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#D39593;\">{{ resumeKicker }}<\u002Fdiv>\n          <div style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:23px;margin-top:8px;\">{{ resumeTitle }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:#8a8780;margin-top:6px;line-height:1.55;max-width:380px;\">{{ resumeSub }}<\u002Fdiv>\n          <div onclick=\"{{ resumeOpen }}\" style=\"cursor:pointer;display:inline-block;margin-top:18px;font-size:12.5px;color:#fff;background:#1E1E1D;border-radius:30px;padding:10px 22px;\" style-hover=\"background:#000;\">{{ resumeBtn }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- chapter list -->\n      <div style=\"margin-top:36px;\">\n        <div style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#a8a49b;margin-bottom:4px;\">All chapters<\u002Fdiv>\n        <sc-if value=\"{{ notLoaded }}\"><div style=\"font-size:13px;color:#b8b4ab;padding:18px 0;\">Loading your chapters…<\u002Fdiv><\u002Fsc-if>\n        <sc-for list=\"{{ chapters }}\" as=\"c\" hint-placeholder-count=\"9\">\n          <div onclick=\"{{ c.open }}\" style=\"{{ c.rowStyle }}\" style-hover=\"background:#fbf7f6;\">\n            <div style=\"display:flex;gap:16px;align-items:baseline;min-width:0;\">\n              <span style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:14px;width:24px;flex:none;{{ c.numColor }}\">{{ c.numStr }}<\u002Fspan>\n              <div style=\"min-width:0;\">\n                <div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"font-size:14.5px;font-weight:600;color:#1E1E1D;\">{{ c.title }}<\u002Fspan><sc-if value=\"{{ c.mand }}\"><span style=\"font-size:9px;color:#fff;background:#c77;border-radius:3px;padding:2px 6px;letter-spacing:0.03em;\">MANDATORY<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n                <div style=\"font-size:12px;color:#9a968d;margin-top:2px;\">{{ c.sub }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"{{ c.statusStyle }}\">{{ c.statusLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- right rail -->\n    <div style=\"width:300px;flex:none;position:sticky;top:96px;margin-top:40px;background:#fff;border:1px solid #e6e4dd;border-radius:12px;padding:28px 26px;box-shadow:0 1px 3px rgba(0,0,0,.04);\">\n      <div style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#8a8780;\">Your progress<\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:16px;margin-top:16px;\">\n        <div style=\"{{ ringStyle }}\"><div style=\"width:54px;height:54px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans';font-weight:700;font-size:16px;\">{{ overallPctLabel }}<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#6b6863;line-height:1.5;\">{{ doneCountLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"height:1px;background:#ececea;margin:24px 0;\"><\u002Fdiv>\n      <div style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#8a8780;\">Badges<\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:14px 12px;margin-top:16px;\">\n        <sc-for list=\"{{ badges }}\" as=\"b\" hint-placeholder-count=\"5\">\n          <div style=\"{{ b.wrapStyle }}\" title=\"{{ b.label }}\">\n            <div style=\"{{ b.circleStyle }}\">{{ b.glyph }}<\u002Fdiv>\n            <div style=\"font-size:9px;color:#6b6863;margin-top:5px;text-align:center;width:52px;line-height:1.2;\">{{ b.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"height:1px;background:#ececea;margin:24px 0;\"><\u002Fdiv>\n      <div style=\"background:#FAFAF8;border:1px solid #eeece6;border-radius:9px;padding:16px;\">\n        <div style=\"font-size:13px;font-weight:600;\">Stuck on something?<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:#8a8780;margin-top:6px;line-height:1.55;\">Your manager and the Systems &amp; Operations Manager are here to help. We'd rather you ask than guess.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ============ CHAPTER / LESSON VIEW ============ -->\n  <sc-if value=\"{{ isChapter }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"max-width:1180px;margin:0 auto;padding:24px 40px 80px;\">\n    <div onclick=\"{{ goHome }}\" style=\"cursor:pointer;font-size:12px;color:#8a8780;display:inline-block;margin-bottom:18px;\" style-hover=\"color:#1E1E1D;\">← Back to hub<\u002Fdiv>\n    <div style=\"display:flex;gap:0;align-items:flex-start;background:#fff;border:1px solid #e6e4dd;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.04);\">\n\n      <!-- lesson rail -->\n      <div style=\"width:282px;flex:none;border-right:1px solid #ececea;padding:30px 26px;background:#FAFAF8;align-self:stretch;\">\n        <div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:13px;color:#D39593;\">{{ chNum }}<\u002Fspan><sc-if value=\"{{ chMand }}\"><span style=\"font-size:9px;color:#fff;background:#c77;border-radius:3px;padding:2px 6px;\">MANDATORY<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n        <div style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:22px;margin-top:8px;line-height:1.15;\">{{ chTitle }}<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:#9a968d;margin-top:8px;\">{{ chMetaLabel }}<\u002Fdiv>\n        <div style=\"height:5px;background:#eae7e0;border-radius:3px;margin-top:14px;overflow:hidden;\"><div style=\"{{ chBarStyle }}\"><\u002Fdiv><\u002Fdiv>\n        <div style=\"margin-top:24px;display:flex;flex-direction:column;gap:4px;\">\n          <sc-for list=\"{{ lessons }}\" as=\"l\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ l.go }}\" style=\"{{ l.rowStyle }}\">\n              <div style=\"{{ l.dotStyle }}\">{{ l.dotText }}<\u002Fdiv>\n              <div style=\"{{ l.titleStyle }}\">{{ l.title }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- lesson body -->\n      <div style=\"flex:1;padding:38px 46px 32px;min-width:0;\">\n        <div style=\"font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:#D39593;\">{{ lessonEyebrow }}<\u002Fdiv>\n        <div style=\"font-family:'Plus Jakarta Sans';font-weight:700;font-size:29px;margin-top:8px;line-height:1.12;\">{{ lessonTitle }}<\u002Fdiv>\n\n        <div style=\"margin-top:18px;\">\n          <sc-for list=\"{{ blocks }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <sc-if value=\"{{ b.isText }}\"><p style=\"{{ b.style }}\">{{ b.v }}<\u002Fp><\u002Fsc-if>\n\n            <sc-if value=\"{{ b.isQuote }}\">\n              <div style=\"border-left:3px solid #D39593;padding:4px 0 4px 24px;margin:10px 0 16px;\">\n                <div style=\"font-family:'Plus Jakarta Sans';font-weight:600;font-size:21px;line-height:1.5;color:#1E1E1D;\">{{ b.v }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ b.isFacts }}\">\n              <div style=\"border:1px solid #eeece6;border-radius:10px;padding:8px 20px;margin:8px 0 18px;background:#FAFAF8;\">\n                <div style=\"font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:#a8a49b;padding:12px 0 8px;\">{{ b.title }}<\u002Fdiv>\n                <sc-for list=\"{{ b.rows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;gap:18px;padding:11px 0;border-top:1px solid #efece6;\">\n                    <div style=\"width:150px;flex:none;font-size:13px;font-weight:600;color:#1E1E1D;\">{{ r.k }}<\u002Fdiv>\n                    <div style=\"font-size:13px;color:#46443f;line-height:1.55;\">{{ r.v }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ b.isCall }}\">\n              <div style=\"display:flex;flex-direction:column;gap:12px;margin:8px 0 18px;\">\n                <sc-for list=\"{{ b.items }}\" as=\"c\" hint-placeholder-count=\"2\">\n                  <div style=\"{{ c.wrapStyle }}\">\n                    <div style=\"{{ c.badgeStyle }}\">{{ c.n }}<\u002Fdiv>\n                    <div><div style=\"{{ c.headStyle }}\">{{ c.head }}<\u002Fdiv><div style=\"{{ c.bodyStyle }}\">{{ c.body }}<\u002Fdiv><sc-if value=\"{{ c.hasLink }}\"><div onclick=\"{{ c.open }}\" style=\"{{ c.linkStyle }}\" style-hover=\"opacity:0.88;\">{{ c.cta }}<\u002Fdiv><\u002Fsc-if><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ b.isList }}\">\n              <div style=\"margin:6px 0 18px;\">\n                <div style=\"font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:#a8a49b;margin-bottom:4px;\">{{ b.title }}<\u002Fdiv>\n                <sc-for list=\"{{ b.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;gap:14px;padding:11px 0;border-bottom:1px solid #f2f0ec;align-items:flex-start;\">\n                    <span style=\"color:#D39593;font-size:15px;line-height:1.4;flex:none;\">—<\u002Fspan>\n                    <div style=\"font-size:13.5px;color:#46443f;line-height:1.6;\">{{ it }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <sc-if value=\"{{ b.isShot }}\">\n              <div style=\"border:1px solid #e6e4dd;border-radius:10px;background:#FAFAF8;padding:18px;margin:10px 0 18px;\">\n                <div style=\"position:relative;background:#fff;border:1px solid #ececea;border-radius:7px;height:280px;background-image:repeating-linear-gradient(45deg,#f4f2ec,#f4f2ec 10px,#ecebe4 10px,#ecebe4 20px);display:flex;align-items:center;justify-content:center;\">\n                  <span style=\"font-family:monospace;font-size:11px;color:#9a968d;background:#fff;padding:5px 10px;border-radius:4px;border:1px solid #eee;\">{{ b.label }}<\u002Fspan>\n                  <sc-for list=\"{{ b.spots }}\" as=\"s\" hint-placeholder-count=\"3\">\n                    <div onclick=\"{{ s.pick }}\" style=\"{{ s.dotStyle }}\">{{ s.n }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <sc-if value=\"{{ hotNote }}\">\n                  <div style=\"display:flex;gap:12px;margin-top:16px;background:#fff;border:1px solid #f0dcdb;border-left:3px solid #D39593;border-radius:6px;padding:14px 16px;\">\n                    <div style=\"width:22px;height:22px;border-radius:50%;background:#D39593;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;flex:none;\">{{ hotNoteN }}<\u002Fdiv>\n                    <div style=\"font-size:12.5px;color:#46443f;line-height:1.6;\">{{ hotNote }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noHotNote }}\">\n                  <div style=\"font-size:11.5px;color:#b8b4ab;margin-top:14px;text-align:center;\">↑ tap a numbered marker to learn what it does<\u002Fdiv>\n                <\u002Fsc-if>\n                <div style=\"font-size:11.5px;color:#9a968d;margin-top:12px;line-height:1.5;\">{{ b.caption }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ===== NOTION LEAVE SIMULATOR ===== -->\n            <sc-if value=\"{{ b.isSim }}\">\n              <div style=\"border:1px solid #e6e4dd;border-radius:10px;overflow:hidden;margin:10px 0 18px;box-shadow:0 6px 22px rgba(0,0,0,.06);\">\n                <div style=\"background:#f3f1ec;border-bottom:1px solid #e3e0d8;padding:10px 14px;display:flex;align-items:center;gap:7px;\">\n                  <div style=\"width:10px;height:10px;border-radius:50%;background:#e0a39f;\"><\u002Fdiv><div style=\"width:10px;height:10px;border-radius:50%;background:#e8d3a0;\"><\u002Fdiv><div style=\"width:10px;height:10px;border-radius:50%;background:#aeb89c;\"><\u002Fdiv>\n                  <div style=\"flex:1;margin-left:10px;background:#fff;border:1px solid #e3e0d8;border-radius:20px;font-size:10.5px;color:#9a968d;padding:5px 13px;\">notion.so/domoproperties · Company Leave Request<\u002Fdiv>\n                  <div style=\"font-size:10px;color:#fff;background:#889480;border-radius:20px;padding:4px 10px;white-space:nowrap;\">● Practice — safe<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;background:#fff;\">\n                  <div style=\"width:180px;flex:none;background:#fbfaf8;border-right:1px solid #ededea;padding:18px 14px;\">\n                    <div style=\"font-size:11.5px;color:#8a8780;font-weight:500;\">A.H. Domo Properties<\u002Fdiv>\n                    <div style=\"margin-top:16px;display:flex;flex-direction:column;gap:2px;font-size:11.5px;color:#6b6863;\">\n                      <div style=\"padding:5px 8px;border-radius:4px;\">🔎&nbsp; Search<\u002Fdiv>\n                      <div style=\"padding:5px 8px;border-radius:4px;background:#efece6;color:#1E1E1D;\">🛒&nbsp; Administration<\u002Fdiv>\n                      <div style=\"padding:5px 8px 5px 24px;border-radius:4px;color:#8a8780;\">Leave Request Form<\u002Fdiv>\n                      <div style=\"padding:5px 8px;border-radius:4px;\">📁&nbsp; Expenses<\u002Fdiv>\n                      <div style=\"padding:5px 8px;border-radius:4px;\">📚&nbsp; SOPs &amp; Library<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"flex:1;padding:30px 38px;min-width:0;\">\n                    <div style=\"font-size:12px;color:#a8a49b;\">🛒 Administration / Databases<\u002Fdiv>\n                    <div style=\"font-size:26px;font-weight:600;margin-top:10px;color:#37352f;\">New Leave Request<\u002Fdiv>\n                    <sc-if value=\"{{ simDone }}\">\n                      <div style=\"margin-top:22px;background:#f3f8f0;border:1px solid #cfe0c4;border-radius:8px;padding:20px 22px;\">\n                        <div style=\"font-size:15px;font-weight:600;color:#5b7a4a;\">✓ Request submitted<\u002Fdiv>\n                        <div style=\"font-size:13px;color:#46443f;margin-top:6px;line-height:1.6;\">Your {{ simType }} request for 5 working days has been sent to your manager for approval. In the real portal it now appears in the <b>Domo Leave Database<\u002Fb>.<\u002Fdiv>\n                        <div onclick=\"{{ simReset }}\" style=\"cursor:pointer;display:inline-block;margin-top:14px;font-size:12px;color:#889480;\">↺ Try again<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ simNotDone }}\">\n                      <div style=\"margin-top:22px;max-width:460px;display:flex;flex-direction:column;gap:16px;\">\n                        <div><div style=\"font-size:11.5px;color:#8a8780;margin-bottom:6px;\">Employee<\u002Fdiv><div style=\"border:1px solid #e3e0d8;border-radius:6px;padding:9px 12px;font-size:13px;color:#37352f;\">{{ profileName }}<\u002Fdiv><\u002Fdiv>\n                        <div style=\"position:relative;\">\n                          <div style=\"font-size:11.5px;color:#8a8780;margin-bottom:6px;\">Leave type<\u002Fdiv>\n                          <div onclick=\"{{ simToggle }}\" style=\"cursor:pointer;border:1.5px solid #D39593;border-radius:6px;padding:9px 12px;font-size:13px;color:#37352f;display:flex;justify-content:space-between;align-items:center;box-shadow:0 0 0 4px rgba(211,149,147,.13);\">{{ simType }} <span style=\"color:#b8b4ab;\">▾<\u002Fspan><\u002Fdiv>\n                          <sc-if value=\"{{ simOpen }}\">\n                            <div style=\"position:absolute;left:0;right:0;top:64px;z-index:5;background:#fff;border:1px solid #e3e0d8;border-radius:8px;box-shadow:0 10px 28px rgba(0,0,0,.12);overflow:hidden;\">\n                              <sc-for list=\"{{ simTypes }}\" as=\"t\" hint-placeholder-count=\"4\">\n                                <div onclick=\"{{ t.pick }}\" style=\"padding:10px 14px;font-size:13px;color:#37352f;cursor:pointer;border-bottom:1px solid #f2f0ec;\" style-hover=\"background:#faf6f5;\">{{ t.label }}<\u002Fdiv>\n                              <\u002Fsc-for>\n                            <\u002Fdiv>\n                          <\u002Fsc-if>\n                        <\u002Fdiv>\n                        <div style=\"display:flex;gap:12px;\">\n                          <div style=\"flex:1;\"><div style=\"font-size:11.5px;color:#8a8780;margin-bottom:6px;\">Start date<\u002Fdiv><div style=\"border:1px solid #e3e0d8;border-radius:6px;padding:9px 12px;font-size:13px;color:#37352f;\">Mon 14 Jul 2025<\u002Fdiv><\u002Fdiv>\n                          <div style=\"flex:1;\"><div style=\"font-size:11.5px;color:#8a8780;margin-bottom:6px;\">End date<\u002Fdiv><div style=\"border:1px solid #e3e0d8;border-radius:6px;padding:9px 12px;font-size:13px;color:#37352f;\">Fri 18 Jul 2025<\u002Fdiv><\u002Fdiv>\n                        <\u002Fdiv>\n                        <div><div style=\"font-size:11.5px;color:#8a8780;margin-bottom:6px;\">Days requested<\u002Fdiv><div style=\"border:1px solid #e3e0d8;border-radius:6px;padding:9px 12px;font-size:13px;color:#37352f;background:#f7faf5;\">5 working days <span style=\"color:#889480;\">· 16 of 21 remaining this year<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                        <div onclick=\"{{ simSubmit }}\" style=\"cursor:pointer;display:inline-block;font-size:13px;color:#fff;background:#1E1E1D;border-radius:6px;padding:10px 22px;text-align:center;\" style-hover=\"background:#000;\">Submit request<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n\n            <!-- ===== OUTLOOK MEETING BOOKING WALKTHROUGH ===== -->\n            <sc-if value=\"{{ b.isOutlook }}\">\n              <div style=\"border:1px solid #e6e4dd;border-radius:10px;overflow:hidden;margin:10px 0 18px;box-shadow:0 6px 22px rgba(0,0,0,.06);\">\n                <div style=\"background:#f3f1ec;border-bottom:1px solid #e3e0d8;padding:10px 14px;display:flex;align-items:center;gap:7px;\">\n                  <div style=\"width:10px;height:10px;border-radius:50%;background:#e0a39f;\"><\u002Fdiv><div style=\"width:10px;height:10px;border-radius:50%;background:#e8d3a0;\"><\u002Fdiv><div style=\"width:10px;height:10px;border-radius:50%;background:#aeb89c;\"><\u002Fdiv>\n                  <div style=\"flex:1;margin-left:10px;background:#fff;border:1px solid #e3e0d8;border-radius:20px;font-size:10.5px;color:#9a968d;padding:5px 13px;\">outlook.office.com/calendar · New event<\u002Fdiv>\n                  <div style=\"font-size:10px;color:#fff;background:#889480;border-radius:20px;padding:4px 10px;white-space:nowrap;\">● Practice — safe<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex;background:#fff;\">\n                  <!-- mini calendar rail -->\n                  <div style=\"width:180px;flex:none;background:#fbfaf8;border-right:1px solid #ededea;padding:18px 14px;\">\n                    <div style=\"font-size:11.5px;color:#8a8780;font-weight:500;\">📅&nbsp; July 2025<\u002Fdiv>\n                    <div style=\"display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:12px;\">\n                      <sc-for list=\"{{ calCells }}\" as=\"d\" hint-placeholder-count=\"35\">\n                        <div style=\"{{ d.style }}\">{{ d.n }}<\u002Fdiv>\n                      <\u002Fsc-for>\n                    <\u002Fdiv>\n                    <div style=\"margin-top:18px;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;color:#a8a49b;\">Your calendar<\u002Fdiv>\n                    <div style=\"margin-top:8px;display:flex;flex-direction:column;gap:6px;\">\n                      <div style=\"display:flex;gap:7px;align-items:center;font-size:11px;color:#6b6863;\"><span style=\"width:8px;height:8px;border-radius:2px;background:#D39593;flex:none;\"><\u002Fspan>Site visit · 13:00<\u002Fdiv>\n                      <div style=\"display:flex;gap:7px;align-items:center;font-size:11px;color:#6b6863;\"><span style=\"width:8px;height:8px;border-radius:2px;background:#889480;flex:none;\"><\u002Fspan>1:1 with manager · 15:00<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <!-- composer -->\n                  <div style=\"flex:1;padding:26px 32px 30px;min-width:0;\">\n                    <sc-if value=\"{{ mtgDone }}\">\n                      <div style=\"background:#f3f8f0;border:1px solid #cfe0c4;border-radius:8px;padding:22px 24px;\">\n                        <div style=\"font-size:15px;font-weight:600;color:#5b7a4a;\">✓ Invitation sent<\u002Fdiv>\n                        <div style=\"font-size:13px;color:#46443f;margin-top:8px;line-height:1.65;\">Your meeting <b>“{{ mtgTitle }}”<\u002Fb> is booked for <b>{{ mtgSlotLabel }}<\u002Fb> in <b>{{ mtgRoom }}<\u002Fb>. Invites have gone to {{ mtgInviteeCount }} colleagues, and it now sits in everyone's Outlook calendar.<\u002Fdiv>\n                        <div style=\"display:flex;gap:10px;align-items:center;margin-top:16px;\">\n                          <div style=\"font-size:11.5px;color:#889480;background:#fff;border:1px solid #cfe0c4;border-radius:20px;padding:5px 12px;\">📨 Teams link added automatically<\u002Fdiv>\n                          <div onclick=\"{{ mtgReset }}\" style=\"cursor:pointer;font-size:12px;color:#889480;\">↺ Try again<\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ mtgNotDone }}\">\n                      <div style=\"display:flex;flex-direction:column;gap:18px;max-width:560px;\">\n                        <!-- title -->\n                        <div>\n                          <input value=\"{{ mtgTitle }}\" oninput=\"{{ mtgOnTitle }}\" placeholder=\"Add a title\" style=\"width:100%;border:none;border-bottom:1.5px solid #e3e0d8;padding:6px 2px;font-size:21px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;color:#37352f;outline:none;background:transparent;\" style-focus=\"border-color:#D39593;\">\n                        <\u002Fdiv>\n                        <!-- attendees -->\n                        <div>\n                          <div style=\"font-size:11.5px;color:#8a8780;margin-bottom:7px;\">👥 Attendees<\u002Fdiv>\n                          <div style=\"display:flex;flex-wrap:wrap;gap:7px;align-items:center;\">\n                            <sc-for list=\"{{ mtgAttendees }}\" as=\"a\" hint-placeholder-count=\"3\">\n                              <div style=\"display:flex;align-items:center;gap:7px;background:#faf6f5;border:1px solid #f0dcdb;border-radius:20px;padding:4px 11px 4px 5px;font-size:12px;color:#46443f;\"><span style=\"width:20px;height:20px;border-radius:50%;background:#D39593;color:#fff;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:600;\">{{ a.ini }}<\u002Fspan>{{ a.name }}<\u002Fdiv>\n                            <\u002Fsc-for>\n                            <span style=\"font-size:12px;color:#b8b4ab;\">+ add<\u002Fspan>\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                        <!-- scheduling assistant -->\n                        <div>\n                          <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;\">\n                            <div style=\"font-size:11.5px;color:#8a8780;\">🕑 Scheduling assistant — Thu 17 Jul<\u002Fdiv>\n                            <div style=\"font-size:10.5px;color:#a8a49b;\">Pick a time everyone's free<\u002Fdiv>\n                          <\u002Fdiv>\n                          <div style=\"display:flex;flex-direction:column;gap:7px;\">\n                            <sc-for list=\"{{ mtgSlots }}\" as=\"s\" hint-placeholder-count=\"4\">\n                              <div onclick=\"{{ s.pick }}\" style=\"{{ s.rowStyle }}\">\n                                <div style=\"display:flex;align-items:center;gap:11px;\">\n                                  <span style=\"{{ s.dotStyle }}\">{{ s.dot }}<\u002Fspan>\n                                  <span style=\"font-size:13px;font-weight:600;color:#37352f;\">{{ s.time }}<\u002Fspan>\n                                  <span style=\"{{ s.tagStyle }}\">{{ s.tag }}<\u002Fspan>\n                                <\u002Fdiv>\n                                <sc-if value=\"{{ s.suggested }}\"><span style=\"font-size:10px;color:#5b7a4a;background:#eaf3e4;border-radius:20px;padding:3px 10px;font-weight:500;\">Best fit<\u002Fspan><\u002Fsc-if>\n                              <\u002Fdiv>\n                            <\u002Fsc-for>\n                          <\u002Fdiv>\n                          <sc-if value=\"{{ mtgConflict }}\"><div style=\"margin-top:9px;font-size:11.5px;color:#b06b66;background:#fbeeed;border:1px solid #f0dcdb;border-radius:6px;padding:8px 12px;\">⚠ 2 colleagues are busy then. You can still book it — but a free slot keeps everyone happy.<\u002Fdiv><\u002Fsc-if>\n                        <\u002Fdiv>\n                        <!-- room + agenda -->\n                        <div style=\"display:flex;gap:16px;\">\n                          <div style=\"flex:1;position:relative;\">\n                            <div style=\"font-size:11.5px;color:#8a8780;margin-bottom:6px;\">📍 Room<\u002Fdiv>\n                            <div onclick=\"{{ mtgRoomToggle }}\" style=\"cursor:pointer;border:1px solid #e3e0d8;border-radius:6px;padding:9px 12px;font-size:13px;color:#37352f;display:flex;justify-content:space-between;align-items:center;\" style-hover=\"border-color:#D39593;\">{{ mtgRoom }} <span style=\"color:#b8b4ab;\">▾<\u002Fspan><\u002Fdiv>\n                            <sc-if value=\"{{ mtgRoomOpen }}\">\n                              <div style=\"position:absolute;left:0;right:0;top:62px;z-index:5;background:#fff;border:1px solid #e3e0d8;border-radius:8px;box-shadow:0 10px 28px rgba(0,0,0,.12);overflow:hidden;\">\n                                <sc-for list=\"{{ mtgRooms }}\" as=\"r\" hint-placeholder-count=\"3\">\n                                  <div onclick=\"{{ r.pick }}\" style=\"padding:10px 13px;font-size:12.5px;color:#37352f;cursor:pointer;border-bottom:1px solid #f2f0ec;\" style-hover=\"background:#faf6f5;\">{{ r.label }}<\u002Fdiv>\n                                <\u002Fsc-for>\n                              <\u002Fdiv>\n                            <\u002Fsc-if>\n                          <\u002Fdiv>\n                          <div style=\"flex:1;\">\n                            <div style=\"font-size:11.5px;color:#8a8780;margin-bottom:6px;\">📝 Agenda <span style=\"color:#b8b4ab;\">(one line)<\u002Fspan><\u002Fdiv>\n                            <input value=\"{{ mtgAgenda }}\" oninput=\"{{ mtgOnAgenda }}\" placeholder=\"e.g. Review July site progress\" style=\"width:100%;border:1px solid #e3e0d8;border-radius:6px;padding:9px 12px;font-size:12.5px;color:#37352f;outline:none;font-family:'Poppins',sans-serif;\" style-focus=\"border-color:#D39593;\">\n                          <\u002Fdiv>\n                        <\u002Fdiv>\n                        <div onclick=\"{{ mtgSend }}\" style=\"{{ mtgSendStyle }}\" style-hover=\"opacity:0.9;\">{{ mtgSendLabel }}<\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- footer nav -->\n        <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:28px;padding-top:22px;border-top:1px solid #f0efeb;\">\n          <div onclick=\"{{ prevGo }}\" style=\"cursor:pointer;font-size:12.5px;color:#8a8780;\" style-hover=\"color:#1E1E1D;\">{{ prevLabel }}<\u002Fdiv>\n          <div onclick=\"{{ markGo }}\" style=\"{{ markStyle }}\" style-hover=\"background:#000;\">{{ markLabel }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:860}}\">\nclass Component extends DCLogic {\n  state = { view:'hub', ch:null, li:0, done:{}, hot:null, hotN:null, simType:'Annual leave', simOpen:false, simDone:false,\n    mtgTitle:'July site progress sync', mtgAgenda:'', mtgSlot:null, mtgRoom:'Conference Room', mtgRoomOpen:false, mtgDone:false,\n    loaded:false, CH:[], BADGES:[], profile:null, showOnboard:false, draftName:'', draftRole:'', menuOpen:false };\n\n  componentDidMount() {\n    try { const s = localStorage.getItem('domo_onboarding_done'); if (s) this.setState({ done: JSON.parse(s) }); } catch(e){}\n    try { const p = localStorage.getItem('domo_onboarding_profile'); if (p) this.setState({ profile: JSON.parse(p) }); else this.setState({ showOnboard:true }); } catch(e){ this.setState({ showOnboard:true }); }\n    import('./onboarding-content.js').then(m => {\n      this.setState({ CH: m.CHAPTERS, BADGES: m.BADGES, loaded:true });\n    });\n  }\n\n  save(done){ try{ localStorage.setItem('domo_onboarding_done', JSON.stringify(done)); }catch(e){} }\n  k(ch,li){ return ch+':'+li; }\n  isDone(ch,li){ return !!this.state.done[this.k(ch,li)]; }\n  chObj(id){ return this.state.CH.find(c=>c.id===id); }\n  chDone(c){ return c.lessons.every((_,i)=>this.isDone(c.id,i)); }\n  chDoneCount(c){ return c.lessons.filter((_,i)=>this.isDone(c.id,i)).length; }\n  firstIncomplete(c){ const i=c.lessons.findIndex((_,idx)=>!this.isDone(c.id,idx)); return i<0?0:i; }\n\n  open(id){ const c=this.chObj(id); this.setState({ view:'chapter', ch:id, li:this.firstIncomplete(c), hot:null, hotN:null, simOpen:false, simDone:false, mtgSlot:null, mtgRoomOpen:false, mtgDone:false }); window.scrollTo(0,0); }\n  goHome(){ this.setState({ view:'hub' }); window.scrollTo(0,0); }\n  goLesson(i){ this.setState({ li:i, hot:null, hotN:null, simOpen:false, simDone:false, mtgSlot:null, mtgRoomOpen:false, mtgDone:false }); }\n  mark(){\n    const c=this.chObj(this.state.ch); const done={...this.state.done}; done[this.k(this.state.ch,this.state.li)]=true; this.save(done);\n    if(this.state.li < c.lessons.length-1){ this.setState({ done, li:this.state.li+1, hot:null, hotN:null, simOpen:false, simDone:false, mtgSlot:null, mtgRoomOpen:false, mtgDone:false }); window.scrollTo(0,0); }\n    else { this.setState({ done, view:'hub' }); window.scrollTo(0,0); }\n  }\n  prev(){ if(this.state.li>0) this.setState({ li:this.state.li-1, hot:null, hotN:null }); else this.goHome(); }\n\n  saveProfile(){\n    const name=(this.state.draftName||'').trim(); if(!name) return;\n    const profile={ name, role:(this.state.draftRole||'').trim(), startedAt:(this.state.profile&&this.state.profile.startedAt)||new Date().toISOString() };\n    // CACHE: persists this device. To make this a real HR portal, also POST `profile`\n    // to your backend / Notion Employees DB here, e.g.:\n    //   fetch('/api/employees', { method:'POST', body: JSON.stringify(profile) });\n    try{ localStorage.setItem('domo_onboarding_profile', JSON.stringify(profile)); }catch(e){}\n    this.setState({ profile, showOnboard:false, menuOpen:false });\n  }\n  editProfile(){ this.setState({ showOnboard:true, menuOpen:false, draftName:(this.state.profile&&this.state.profile.name)||'', draftRole:(this.state.profile&&this.state.profile.role)||'' }); }\n  resetProgress(){ this.save({}); this.setState({ done:{}, menuOpen:false, view:'hub' }); window.scrollTo(0,0); }\n\n  outlookVals(rose, sage){\n    const S=this.state;\n    // mini calendar — July 2025 starts on a Tuesday; 17th is the target day\n    const cells=[];\n    for(let i=0;i<1;i++) cells.push({n:'', style:'height:22px;'}); // Jul 1 2025 = Tuesday\n    for(let d=1; d<=31; d++){\n      const isTarget=d===17, isToday=d===14;\n      cells.push({ n:String(d),\n        style:'height:22px;display:flex;align-items:center;justify-content:center;font-size:10.5px;border-radius:4px;'+\n          (isTarget?'background:#D39593;color:#fff;font-weight:600;':isToday?'border:1px solid #D39593;color:#46443f;':'color:#8a8780;') });\n    }\n    const calCells=cells;\n\n    const attendees=[\n      {ini:'AK', name:'Andreas (mgr)'},\n      {ini:'MG', name:'Maria'},\n      {ini:'PC', name:'Petros'},\n    ];\n\n    const slotDefs=[\n      { time:'09:30 – 10:00', tag:'Everyone free', free:true, suggested:true },\n      { time:'11:00 – 11:30', tag:'Everyone free', free:true, suggested:false },\n      { time:'14:00 – 14:30', tag:'2 busy', free:false, suggested:false },\n      { time:'16:30 – 17:00', tag:'Everyone free', free:true, suggested:false },\n    ];\n    const mtgSlots=slotDefs.map((s,i)=>{\n      const active=S.mtgSlot===i;\n      return {\n        time:s.time, tag:s.tag, suggested:s.suggested,\n        pick:()=>this.setState({mtgSlot:i}),\n        rowStyle:'cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-radius:7px;padding:10px 13px;'+\n          (active?'border:1.5px solid #D39593;background:#faf6f5;box-shadow:0 0 0 4px rgba(211,149,147,.13);':'border:1px solid #ededea;background:#fff;'),\n        dot:s.free?'✓':'•',\n        dotStyle:'width:18px;height:18px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;'+\n          (s.free?'background:'+sage+';color:#fff;':'background:#eddedc;color:#b06b66;'),\n        tagStyle:'font-size:11px;color:'+(s.free?'#889480':'#b06b66')+';',\n      };\n    });\n    const picked=S.mtgSlot!=null;\n    const mtgConflict=picked && !slotDefs[S.mtgSlot].free;\n    const mtgRooms=['Conference Room','Meeting Room 2','Microsoft Teams (online)'].map(r=>({\n      label:r, pick:()=>this.setState({mtgRoom:r, mtgRoomOpen:false}),\n    }));\n    const titleOk=(S.mtgTitle||'').trim().length>0;\n    const canSend=picked && titleOk;\n\n    return {\n      calCells, mtgAttendees:attendees, mtgSlots, mtgConflict,\n      mtgTitle:S.mtgTitle, mtgAgenda:S.mtgAgenda,\n      mtgOnTitle:(e)=>this.setState({mtgTitle:e.target.value}),\n      mtgOnAgenda:(e)=>this.setState({mtgAgenda:e.target.value}),\n      mtgRoom:S.mtgRoom, mtgRoomOpen:S.mtgRoomOpen, mtgRooms,\n      mtgRoomToggle:()=>this.setState({mtgRoomOpen:!S.mtgRoomOpen}),\n      mtgDone:S.mtgDone, mtgNotDone:!S.mtgDone,\n      mtgSlotLabel: picked? 'Thu 17 Jul, '+slotDefs[S.mtgSlot].time : '',\n      mtgInviteeCount: attendees.length,\n      mtgSend:()=>{ if(canSend) this.setState({mtgDone:true, mtgRoomOpen:false}); },\n      mtgReset:()=>this.setState({mtgDone:false, mtgSlot:null}),\n      mtgSendLabel: canSend?'Send invitation →':(picked?'Add a title to send':'Pick a time to send'),\n      mtgSendStyle:'display:inline-block;align-self:flex-start;font-size:13px;color:#fff;border-radius:6px;padding:11px 24px;'+\n        (canSend?'cursor:pointer;background:#1E1E1D;':'cursor:not-allowed;background:#c9c6bf;'),\n    };\n  }\n\n  renderVals(){\n    const S=this.state, ink='#1E1E1D', rose='#D39593', sage='#889480', mut='#9a968d';\n    const prof=S.profile, nm=((prof&&prof.name)||'').trim();\n    const parts=nm.split(/\\s+/).filter(Boolean);\n    const firstName=parts[0]||'there';\n    const initials=parts.length?(parts[0][0]+(parts.length>1?parts[parts.length-1][0]:'')).toUpperCase():'\\u2022';\n    const profileName=nm||'New colleague';\n    const roleLabel=(prof&&prof.role)?prof.role:'DOMO Properties';\n    const draftReady=(S.draftName||'').trim().length>0;\n    const totalLessons = S.CH.reduce((n,c)=>n+c.lessons.length,0) || 1;\n    const doneLessons = Object.keys(S.done).filter(k=>S.done[k]).length;\n    const overallPct = Math.round(doneLessons/totalLessons*100);\n    const allChDone = S.CH.length>0 && S.CH.every(c=>this.chDone(c));\n\n    const h=new Date().getHours();\n    const greeting = (h<12?'Good morning':h<18?'Good afternoon':'Good evening')+', '+firstName;\n    const dateLabel = new Date().toLocaleDateString('en-GB',{weekday:'long', day:'numeric', month:'long'});\n\n    // resume target\n    const resumeCh = S.CH.find(c=>!this.chDone(c));\n    let resumeKicker='All done', resumeTitle='You\\u2019re fully onboarded', resumeSub='Revisit any chapter any time from the list below.', resumeBtn='Review chapters', resumeOpen=()=>this.goHome();\n    if(resumeCh){\n      const started=this.chDoneCount(resumeCh)>0;\n      resumeKicker = started?'Pick up where you left off':'Start here';\n      resumeTitle = (started?'Continue: ':'Begin: ')+resumeCh.title;\n      const ln=this.firstIncomplete(resumeCh)+1;\n      resumeSub = 'Lesson '+ln+' of '+resumeCh.lessons.length+' · '+resumeCh.sub;\n      resumeBtn = (started?'Resume chapter':'Start chapter')+' →';\n      resumeOpen = ()=>this.open(resumeCh.id);\n    }\n\n    // chapter rows\n    const rowBase = 'cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:15px 14px;border-radius:8px;margin:0 -14px;border-bottom:1px solid #f0efeb;';\n    const chapters = S.CH.map(c=>{\n      const done=this.chDone(c), started=this.chDoneCount(c)>0;\n      let statusLabel, statusColor, rowExtra='';\n      if(done){ statusLabel='✓ Completed'; statusColor=sage; }\n      else if(started){ statusLabel='In progress · '+Math.round(this.chDoneCount(c)/c.lessons.length*100)+'%'; statusColor=rose; rowExtra='background:#fcf7f6;'; }\n      else { statusLabel='Not started'; statusColor='#b8b4ab'; }\n      return {\n        numStr:c.num, title:c.title, sub:c.sub, mand:!!c.mand,\n        numColor:'color:'+(done?sage:started?rose:'#c2bfb6'),\n        statusLabel, statusStyle:'font-size:11.5px;white-space:nowrap;flex:none;color:'+statusColor,\n        rowStyle: rowBase+rowExtra,\n        open:()=>this.open(c.id),\n      };\n    });\n\n    // badges\n    const badges=(S.BADGES||[]).map(b=>{\n      const earned = b.when.every(id=>{ const c=this.chObj(id); return c && this.chDone(c); });\n      return {\n        label:b.label, glyph:b.glyph,\n        wrapStyle:'text-align:center;display:flex;flex-direction:column;align-items:center;'+(earned?'':'opacity:.42;'),\n        circleStyle:'width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;'+(earned?'background:'+sage+';color:#fff;':'border:1.5px dashed #c2bfb6;color:#c2bfb6;'),\n      };\n    });\n\n    const ringStyle = 'width:72px;height:72px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;background:conic-gradient('+rose+' 0 '+overallPct+'%, #eae7e0 '+overallPct+'% 100%);';\n\n    const base = {\n      goHome:()=>this.goHome(),\n      profileName, initials, roleLabel,\n      showOnboard:S.showOnboard, draftName:S.draftName, draftRole:S.draftRole,\n      onName:(e)=>this.setState({draftName:e.target.value}),\n      onRole:(e)=>this.setState({draftRole:e.target.value}),\n      saveProfile:()=>this.saveProfile(),\n      startBtnStyle:'display:inline-block;margin-top:18px;font-size:13.5px;color:#fff;background:#1E1E1D;border-radius:30px;padding:12px 26px;'+(draftReady?'cursor:pointer;':'cursor:not-allowed;opacity:0.4;'),\n      menuOpen:S.menuOpen, toggleMenu:()=>this.setState({menuOpen:!S.menuOpen}),\n      editProfile:()=>this.editProfile(), resetProgress:()=>this.resetProgress(),\n      isHub:S.view==='hub', isChapter:S.view==='chapter',\n      loaded:S.loaded, notLoaded:!S.loaded,\n      overallPctLabel:overallPct+'%',\n      doneCountLabel:(S.loaded?doneLessons+' of '+totalLessons+' lessons done':'\\u2014'),\n      dateLabel, greeting,\n      intro: allChDone? 'Everything\\u2019s complete — welcome to the team. Revisit anything below whenever you need it.' : 'Nine short chapters to get you settled in. Take them in order or jump around — your progress saves automatically.',\n      resumeKicker, resumeTitle, resumeSub, resumeBtn, resumeOpen,\n      chapters, badges, ringStyle,\n    };\n\n    if(S.view!=='chapter' || !S.loaded) return base;\n\n    // ---- chapter view ----\n    const c=this.chObj(S.ch); if(!c) return base;\n    const lesson=c.lessons[S.li];\n    const chPct=Math.round(this.chDoneCount(c)/c.lessons.length*100);\n\n    const lessons=c.lessons.map((l,i)=>{\n      const ld=this.isDone(c.id,i), active=i===S.li;\n      return {\n        title:l.title, go:()=>this.goLesson(i),\n        rowStyle:'cursor:pointer;display:flex;gap:12px;align-items:center;padding:10px 12px;border-radius:7px;'+(active?'background:#fff;border:1px solid #f0dcdb;':'border:1px solid transparent;'),\n        dotStyle:'width:20px;height:20px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;'+(ld?'background:'+sage+';color:#fff;':active?'background:'+rose+';color:#fff;':'border:1.5px solid #d8d5cc;color:#b8b4ab;'),\n        dotText:ld?'✓':String(i+1),\n        titleStyle:'font-size:12.5px;line-height:1.3;'+(active?'color:#1E1E1D;font-weight:600;':ld?'color:#46443f;':'color:#9a968d;'),\n      };\n    });\n\n    const simTypes=['Annual leave','Sick leave','Parental leave','Bereavement leave'].map(t=>({label:t, pick:()=>this.setState({simType:t, simOpen:false})}));\n\n    const blocks=(lesson.blocks||[]).map(b=>{\n      const o={ isText:false,isQuote:false,isFacts:false,isCall:false,isList:false,isShot:false,isSim:false,isOutlook:false };\n      if(b.t==='text'){ o.isText=true; o.v=b.v; o.style='margin:0 0 14px;font-size:'+(b.lead?'16px':'14px')+';line-height:1.72;color:'+(b.lead?'#1E1E1D':'#46443f')+';'+(b.lead?'font-weight:500;':'')+'max-width:640px;'; }\n      else if(b.t==='quote'){ o.isQuote=true; o.v=b.v; }\n      else if(b.t==='facts'){ o.isFacts=true; o.title=b.title; o.rows=b.rows.map(r=>({k:r[0],v:r[1]})); }\n      else if(b.t==='list'){ o.isList=true; o.title=b.title; o.items=b.items; }\n      else if(b.t==='call'){ o.isCall=true; o.items=b.items.map(it=>({\n        n:it.n, head:it.title, body:it.body,\n        wrapStyle:'display:flex;gap:14px;border-radius:9px;padding:16px 18px;'+(it.dark?'background:#1E1E1D;':'background:#FAFAF8;border:1px solid #eeece6;'),\n        badgeStyle:'width:30px;height:30px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;background:'+(it.dark?rose:'#fff')+';color:'+(it.dark?'#fff':rose)+';'+(it.dark?'':'border:1px solid #f0dcdb;'),\n        headStyle:'font-size:14px;font-weight:600;color:'+(it.dark?'#fff':'#1E1E1D')+';',\n        bodyStyle:'font-size:12.8px;line-height:1.62;margin-top:4px;color:'+(it.dark?'#c9c6bf':'#6b6863')+';',\n        hasLink:!!it.href, cta:it.cta||'Open \\u2192',\n        linkStyle:'cursor:pointer;display:inline-block;margin-top:12px;font-size:12px;color:#fff;background:'+(it.dark?rose:'#1E1E1D')+';border-radius:30px;padding:8px 18px;',\n        open:it.href?(()=>window.open(it.href,'_blank','noopener')):(()=>{}),\n      })); }\n      else if(b.t==='shot'){ o.isShot=true; o.label=b.label; o.caption=b.caption||''; o.spots=(b.spots||[]).map(s=>({\n        n:s.n, pick:()=>this.setState({hot:s.note, hotN:s.n}),\n        dotStyle:'position:absolute;left:'+s.x+';top:'+s.y+';width:24px;height:24px;border-radius:50%;background:'+rose+';color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer;box-shadow:0 0 0 6px rgba(211,149,147,.22);transform:translate(-50%,-50%);',\n      })); }\n      else if(b.t==='sim'){ o.isSim=true; }\n      else if(b.t==='outlook'){ o.isOutlook=true; }\n      return o;\n    });\n\n    const isLast=S.li===c.lessons.length-1;\n    return Object.assign(base, {\n      chNum:c.num, chTitle:c.title, chMand:!!c.mand,\n      chMetaLabel:c.lessons.length+' lesson'+(c.lessons.length>1?'s':'')+' · '+chPct+'% complete',\n      chBarStyle:'width:'+chPct+'%;height:100%;background:'+rose+';',\n      lessons,\n      lessonEyebrow:'Lesson '+(S.li+1)+' of '+c.lessons.length,\n      lessonTitle:lesson.title,\n      blocks,\n      hotNote:S.hot, hotNoteN:S.hotN, noHotNote:!S.hot,\n      simType:S.simType, simOpen:S.simOpen, simDone:S.simDone, simNotDone:!S.simDone, simTypes,\n      simToggle:()=>this.setState({simOpen:!S.simOpen}),\n      simSubmit:()=>this.setState({simDone:true, simOpen:false}),\n      simReset:()=>this.setState({simDone:false}),\n\n      // ----- Outlook meeting booking -----\n      ...this.outlookVals(rose, sage),\n\n      prevLabel:S.li>0?'← Previous lesson':'← Back to hub',\n      prevGo:()=>this.prev(),\n      markLabel:isLast?'Finish chapter ✓':'Mark complete & continue →',\n      markGo:()=>this.mark(),\n      markStyle:'cursor:pointer;font-size:13px;color:#fff;background:#1E1E1D;border-radius:30px;padding:11px 24px;',\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
